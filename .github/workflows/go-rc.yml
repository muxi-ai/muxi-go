name: Go SDK RC

on:
  push:
    branches: [rc]

permissions: {}

jobs:
  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.21'
          cache-dependency-path: src/go.sum
      - name: Unit tests
        working-directory: src
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    needs: unit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.21'
          cache-dependency-path: src/go.sum
      - name: Integration tests
        env:
          MUXI_SDK_E2E_SERVER_URL: ${{ secrets.MUXI_SDK_E2E_SERVER_URL }}
          MUXI_SDK_E2E_KEY_ID: ${{ secrets.MUXI_SDK_E2E_KEY_ID }}
          MUXI_SDK_E2E_SECRET_KEY: ${{ secrets.MUXI_SDK_E2E_SECRET_KEY }}
          MUXI_SDK_E2E_FORMATION_ID: ${{ secrets.MUXI_SDK_E2E_FORMATION_ID }}
          MUXI_SDK_E2E_CLIENT_KEY: ${{ secrets.MUXI_SDK_E2E_CLIENT_KEY }}
          MUXI_SDK_E2E_ADMIN_KEY: ${{ secrets.MUXI_SDK_E2E_ADMIN_KEY }}
        working-directory: src
        run: |
          : "${MUXI_SDK_E2E_SERVER_URL:?set MUXI_SDK_E2E_SERVER_URL}"
          : "${MUXI_SDK_E2E_KEY_ID:?set MUXI_SDK_E2E_KEY_ID}"
          : "${MUXI_SDK_E2E_SECRET_KEY:?set MUXI_SDK_E2E_SECRET_KEY}"
          : "${MUXI_SDK_E2E_FORMATION_ID:?set MUXI_SDK_E2E_FORMATION_ID}"
          : "${MUXI_SDK_E2E_CLIENT_KEY:?set MUXI_SDK_E2E_CLIENT_KEY}"
          go test -tags=integration ./integration
