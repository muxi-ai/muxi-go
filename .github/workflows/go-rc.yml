name: Go SDK RC

on:
  push:
    branches: [rc]

permissions: {}

jobs:
  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v5
        with:
          go-version: '1.21'
          cache-dependency-path: src/go.sum
      - name: Unit tests
        working-directory: src
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    needs: unit
    permissions:
      contents: read
    env:
      MUXI_SDK_E2E_SERVER_URL: ${{ secrets.MUXI_SDK_E2E_SERVER_URL }}
    steps:
      - name: Check test server reachability
        id: check
        run: |
          if [ -z "$MUXI_SDK_E2E_SERVER_URL" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::Integration tests skipped — no server URL configured"
          elif ! curl -sf --max-time 5 "${MUXI_SDK_E2E_SERVER_URL}/ping" >/dev/null 2>&1 && \
               ! curl -sf --max-time 5 "${MUXI_SDK_E2E_SERVER_URL}" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::Integration tests skipped — test server not reachable"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        if: steps.check.outputs.skip != 'true'
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v5
        if: steps.check.outputs.skip != 'true'
        with:
          go-version: '1.21'
          cache-dependency-path: src/go.sum
      - name: Integration tests
        if: steps.check.outputs.skip != 'true'
        env:
          MUXI_E2E_SERVER_URL: ${{ secrets.MUXI_SDK_E2E_SERVER_URL }}
          MUXI_E2E_KEY_ID: ${{ secrets.MUXI_SDK_E2E_KEY_ID }}
          MUXI_E2E_SECRET_KEY: ${{ secrets.MUXI_SDK_E2E_SECRET_KEY }}
          MUXI_E2E_FORMATION_ID: ${{ secrets.MUXI_SDK_E2E_FORMATION_ID }}
          MUXI_E2E_CLIENT_KEY: ${{ secrets.MUXI_SDK_E2E_CLIENT_KEY }}
          MUXI_E2E_ADMIN_KEY: ${{ secrets.MUXI_SDK_E2E_ADMIN_KEY }}
        working-directory: src
        run: go test -tags=integration ./integration
