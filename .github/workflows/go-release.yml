name: Go SDK Release

on:
  push:
    branches: [main]

permissions: {}

env:
  VERSION_FILE: src/.version

jobs:
  test:
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MUXI_SDK_E2E_SERVER_URL: ${{ secrets.MUXI_SDK_E2E_SERVER_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v5
        with:
          go-version: '1.21'
          cache-dependency-path: src/go.sum

      - name: Unit tests
        working-directory: src
        run: go test ./...

      - name: Require test server
        run: |
          if [ -z "$MUXI_SDK_E2E_SERVER_URL" ]; then
            echo "::error::MUXI_SDK_E2E_SERVER_URL secret is not set"
            exit 1
          fi
          if ! curl -sf --max-time 10 "${MUXI_SDK_E2E_SERVER_URL}/ping" >/dev/null 2>&1 && \
             ! curl -sf --max-time 10 "${MUXI_SDK_E2E_SERVER_URL}" >/dev/null 2>&1; then
            echo "::error::Test server is not reachable at ${MUXI_SDK_E2E_SERVER_URL}"
            exit 1
          fi

      - name: Integration tests
        env:
          MUXI_E2E_SERVER_URL: ${{ secrets.MUXI_SDK_E2E_SERVER_URL }}
          MUXI_E2E_KEY_ID: ${{ secrets.MUXI_SDK_E2E_KEY_ID }}
          MUXI_E2E_SECRET_KEY: ${{ secrets.MUXI_SDK_E2E_SECRET_KEY }}
          MUXI_E2E_FORMATION_ID: ${{ secrets.MUXI_SDK_E2E_FORMATION_ID }}
          MUXI_E2E_CLIENT_KEY: ${{ secrets.MUXI_SDK_E2E_CLIENT_KEY }}
          MUXI_E2E_ADMIN_KEY: ${{ secrets.MUXI_SDK_E2E_ADMIN_KEY }}
        working-directory: src
        run: go test -tags=integration ./integration

  release:
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MUXI_RELEASE_TOKEN }}

      - name: Compute next version (ScalVer)
        id: version
        run: |
          if [ -f "$VERSION_FILE" ]; then
            CURRENT=$(cat "$VERSION_FILE")
          else
            CURRENT="0.20000101.0"
          fi

          C_MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          C_DATE=$(echo "$CURRENT" | cut -d. -f2)
          C_PATCH=$(echo "$CURRENT" | cut -d. -f3)
          TODAY=$(date -u +%Y%m%d)

          NEXT_MAJOR=$C_MAJOR
          if [ "$TODAY" = "$C_DATE" ]; then
            NEXT_PATCH=$((C_PATCH + 1))
          else
            NEXT_PATCH=0
          fi

          NEXT_VERSION="${NEXT_MAJOR}.${TODAY}.${NEXT_PATCH}"

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV

      - name: Commit version bump
        run: |
          echo "$NEXT_VERSION" > "$VERSION_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$VERSION_FILE"
          if git diff --cached --quiet; then
            echo "No version change to commit"
          else
            git commit -m "chore: release v$NEXT_VERSION"
            git push origin HEAD:main
          fi

      - name: Create and push tag
        run: |
          TAG="v$NEXT_VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          tag_name: v${{ env.NEXT_VERSION }}
          name: v${{ env.NEXT_VERSION }}
          body: |
            Go SDK release v${{ env.NEXT_VERSION }}
            Commit: ${{ github.sha }}

  sync_develop:
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.MUXI_RELEASE_TOKEN }}

      - name: Merge main into develop
        run: |
          git fetch origin main develop
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/main --no-edit -m "chore: sync main to develop [skip ci]"
          git push origin HEAD:develop
